name: Tech 8ytees Weekly Strategy

on:
  schedule:
    # Run every Sunday at 00:00 UTC (5:30 AM IST)
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  generate_strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ──────────────────────────
      - name: 📦 Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run AI Strategy Pipeline ──────────────────────
      - name: 🚀 Run AI Strategy Generation
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: python generate_strategy.py

      # ── 5. Upload Report Artifact ────────────────────────
      - name: 💾 Upload Strategy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-report-week-${{ github.run_number }}
          path: reports/*.md
          retention-days: 14
          if-no-files-found: ignore

      # ── 6. Commit Weekly Ideas to Repo ───────────────────
      - name: 🔄 Commit Weekly Ideas
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main || true
          git add weekly_ideas.txt reports/ || echo "No files to add"
          git diff --staged --quiet || git commit -m "🤖 Auto-update: Weekly strategy ideas [skip ci]"
          git push origin main || echo "Push failed (likely no changes)"
