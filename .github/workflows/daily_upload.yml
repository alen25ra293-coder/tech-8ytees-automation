name: Tech 8ytees Daily Upload

on:
  schedule:
    - cron: '0 0 * * *'   # 12:00 AM UTC  → 5:30 AM IST
    - cron: '0 6 * * *'   # 6:00 AM UTC   → 11:30 AM IST
    - cron: '0 12 * * *'  # 12:00 PM UTC  → 5:30 PM IST
    - cron: '0 18 * * *'  # 6:00 PM UTC   → 11:30 PM IST
  workflow_dispatch:       # Allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. System dependencies ────────────────────────────
      - name: 📦 Install system dependencies (FFmpeg + fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-open-sans \
            imagemagick

      # ── 4. Python packages ───────────────────────────────
      - name: 📦 Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── 5. Write YouTube OAuth token ─────────────────────
      - name: 🔑 Write YouTube token.json
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json

      # ── 6. Run automation ─────────────────────────────────
      - name: 🚀 Run Tech 8ytees automation
        env:
          # Gemini AI (script generation)
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEYS }}   # legacy alias

          # Voice / Media
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}

          # Instagram — Graph API (primary, most reliable)
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_GRAPH_ACCESS_TOKEN:  ${{ secrets.IG_GRAPH_ACCESS_TOKEN }}

          # Instagram — Instagrapi fallback (may fail on cloud IPs)
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}

          # Misc
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: python main.py

      # ── 7. Upload output video as artifact (for debugging) ──
      - name: 📼 Save output video as artifact (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-video-${{ github.run_number }}
          path: output.mp4
          retention-days: 3
          if-no-files-found: ignore

      # ── 8. Cleanup ────────────────────────────────────────
      - name: 🧹 Clean up temporary files
        if: always()
        run: |
          rm -f output.mp4 voiceover.mp3 bg_video.mp4 bg_looped.mp4 \
                token.json subtitles.vtt temp_script.txt
          rm -f bg_clip_*.mp4 scaled_*.mp4 clips.txt
