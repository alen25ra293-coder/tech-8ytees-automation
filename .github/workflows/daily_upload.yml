name: Tech 8ytees Daily Upload

on:
  schedule:
    # ── Day-specific optimal posting times for Indian tech audience ──────
    # Strategy: 1 upload/day at peak engagement slot for that day (IST).
    # Algorithm rewards high retention per video, not volume.
    #
    # Day of week    | Cron (UTC)          | IST equivalent | Reason
    # ────────────────────────────────────────────────────────────────────
    # Sunday (0)     | 30 7  * * 0         | 1:00 PM IST    | Leisure scrolling
    # Monday (1)     | 30 14 * * 1         | 8:00 PM IST    | Post-work catch-up
    # Tuesday (2)    | 30 13 * * 2         | 7:00 PM IST    | After-work + lunch spike
    # Wednesday (3)  | 30 13 * * 3         | 7:00 PM IST    | Peak midweek engagement
    # Thursday (4)   | 30 13 * * 4         | 7:00 PM IST    | Weekend anticipation
    # Friday (5)     | 30 12 * * 5         | 6:00 PM IST    | "Viral window" — weekend mode
    # Saturday (6)   | 30 5  * * 6         | 11:00 AM IST   | Late wake-up, leisure scroll
    #
    # NOTE: Times are scheduled ~60 min early to account for GitHub Actions delays.

    - cron: '30 7  * * 0'   # Sunday    → 1:00 PM IST (leisure scrolling)
    - cron: '30 14 * * 1'   # Monday    → 8:00 PM IST (post-work catch-up)
    - cron: '30 13 * * 2'   # Tuesday   → 7:00 PM IST (after work)
    - cron: '30 13 * * 3'   # Wednesday → 7:00 PM IST (peak midweek)
    - cron: '30 13 * * 4'   # Thursday  → 7:00 PM IST (weekend anticipation)
    - cron: '30 12 * * 5'   # Friday    → 6:00 PM IST (viral window)
    - cron: '30 5  * * 6'   # Saturday  → 11:00 AM IST (late wake-up scroll)

  workflow_dispatch:        # Manual trigger from GitHub UI
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily_upload.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  XDG_CACHE_HOME: /home/runner/.cache
  HF_HOME:        /home/runner/.cache/huggingface
  WHISPER_CACHE:  /home/runner/.cache/whisper

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. System dependencies ────────────────────────────
      - name: 📦 Install system dependencies (FFmpeg + fonts + audio)
        run: |
          sudo apt-get update -qq
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            ttf-mscorefonts-installer \
            fonts-liberation \
            espeak-ng \
            libsndfile1 \
            imagemagick

      # ── 4. Cache Kokoro + Whisper models ─────────────────
      - name: 💾 Cache AI models (Kokoro + Whisper)
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/huggingface
            /home/runner/.cache/whisper
          key: ai-models-kokoro-whisper-v1
          restore-keys: |
            ai-models-kokoro-whisper-

      # ── 5. Python packages ───────────────────────────────
      - name: 📦 Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── 6. Write YouTube OAuth token ─────────────────────
      - name: 🔑 Write YouTube token.json
        run: |
          python3 -c "
          import json, os, re
          # Get secret and clean it
          token_str = os.environ['YOUTUBE_TOKEN_JSON']
          # Strip BOM
          if token_str.startswith('\ufeff'):
              token_str = token_str[1:]
          # Remove any newlines, tabs, or control characters within the JSON
          token_str = re.sub(r'[\x00-\x1f\x7f-\x9f]', '', token_str)
          # Parse and rewrite cleanly
          token_data = json.loads(token_str)
          with open('token.json', 'w', encoding='utf-8') as f:
              json.dump(token_data, f, indent=2)
          "
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

      # ── 7. Run automation ─────────────────────────────────
      - name: 🚀 Run Tech 8ytees automation
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEYS }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_GRAPH_ACCESS_TOKEN:  ${{ secrets.IG_GRAPH_ACCESS_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: python main.py

      # ── 8. Upload output video as artifact (for debugging) ─
      - name: 📼 Save output video as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-video-${{ github.run_number }}
          path: |
            output.mp4
            output_thumbnail.jpg
          retention-days: 5
          if-no-files-found: ignore

      # ── 9. Cleanup ─────────────────────────────────────────
      - name: 🧹 Clean up temporary files
        if: always()
        run: |
          rm -f output.mp4 output_thumbnail.jpg voiceover.mp3 voiceover_raw.wav \
                bg_video.mp4 bg_looped.mp4 main_video.mp4 end_card.mp4 \
                token.json subtitles.vtt subtitles_words.vtt temp_script.txt
          rm -f bg_clip_*.mp4 scaled_*.mp4 clips.txt final_concat.txt
